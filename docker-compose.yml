services:
  web:
    build: .
    container_name: django_web
    volumes:
      - .:/code
    env_file:
      - .env
    expose:
      - "8000"


  nginx:
    image: nginx:alpine
    container_name: nginx_proxyy
    ports:
      - "8080:80"
    volumes:
      - ./ngnix/default.conf:/etc/nginx/conf.d/default.conf
      - ./static:/code/static
    depends_on:
      - web 